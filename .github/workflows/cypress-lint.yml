name: Cypress Tests Lint & Format Check

on:
  pull_request:
    paths:
      - 'ConcernsCaseWork/ConcernsCaseWork.CypressTests/**'

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ConcernsCaseWork/ConcernsCaseWork.CypressTests

    steps:
      - name: Checkout code
        # Updated to latest v5 SHA
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Node.js
        # Updated to latest v5 SHA
        uses: actions/setup-node@a0853c24544627f39e4f0d1df4e3f2dca4ea0c52
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ConcernsCaseWork/ConcernsCaseWork.CypressTests/package-lock.json'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting and lint
        run: npm run format:check
