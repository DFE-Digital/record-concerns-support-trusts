name: Cypress Tests Lint & Format Check

on:
  pull_request:
    paths:
      - 'ConcernsCaseWork/ConcernsCaseWork.CypressTests/**'

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ConcernsCaseWork/ConcernsCaseWork.CypressTests

    steps:
      - name: Checkout code
        # Updated to latest v4 SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        # Updated to latest v4 SHA
        uses: actions/setup-node@1d429dc21bdc97609b522027b735145f223bb02e # v4.2.1
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ConcernsCaseWork/ConcernsCaseWork.CypressTests/package-lock.json'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting and lint
        run: npm run format:check
